[phases.setup]
nixPkgs = ["python312", "nodejs_20", "pnpm"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r requirements.txt",
  "cd web && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["cd web && pnpm build"]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"
